{{ form.hidden_tag() }}
{% for field in form if field.name not in ('csrf_token','submit') %}
<div class="mb-3"><label class="form-label" for="{{ field.id }}">{{ field.label.text }}</label>{{ field(class='form-select' if field.type == 'SelectField' else 'form-control') }}{% for error in field.errors %}<div class="text-danger small">{{ error }}</div>{% endfor %}</div>
{% endfor %}
{{ form.submit(class='btn btn-primary') }}
