<form method="get" class="card border-0 shadow-sm mb-4"><div class="card-body row g-3"><div class="col-md"><label class="form-label">Start date</label><input class="form-control" type="date" name="start_date" value="{{ filters.get('start_date','') }}"></div><div class="col-md"><label class="form-label">End date</label><input class="form-control" type="date" name="end_date" value="{{ filters.get('end_date','') }}"></div><div class="col-md"><label class="form-label">Department</label><select class="form-select" name="department_id"><option value="">All</option>{% for x in departments %}<option value="{{ x.id }}" {{ 'selected' if filters.get('department_id') == x.id }}>{{ x.name }}</option>{% endfor %}</select></div><div class="col-md"><label class="form-label">Doctor</label><select class="form-select" name="doctor_id"><option value="">All</option>{% for x in doctors %}<option value="{{ x.id }}" {{ 'selected' if filters.get('doctor_id') == x.id }}>{{ x.user.full_name if x.user else x.id }}</option>{% endfor %}</select></div><div class="col-md-auto d-flex align-items-end"><button class="btn btn-primary">Apply</button></div></div></form>
