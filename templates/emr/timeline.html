<section class="card border-0 shadow-sm"><div class="card-body"><h2 class="h5 mb-4">Clinical timeline</h2><div class="timeline">{% for event in timeline %}<div class="border-start border-primary border-3 ps-3 pb-4"><div class="d-flex justify-content-between"><strong>{{ event.title }}</strong><span class="badge text-bg-light">{{ event.kind }}</span></div><small class="text-body-secondary">{{ event.at.strftime('%Y-%m-%d %H:%M') }}</small>{% if event.kind=='visit' %}<div><a href="{{ url_for('emr.visit_detail',visit_id=event.object.id) }}">Open visit</a></div>{% elif event.kind=='attachment' %}<div><a href="{{ url_for('patients.download_attachment',attachment_id=event.object.id) }}">Download</a></div>{% endif %}</div>{% else %}<p class="text-body-secondary">No clinical events yet.</p>{% endfor %}</div></div></section>
